  tailwind.config = {
    corePlugins: { preflight: false },
    theme: { extend: { fontFamily: { sans: ["var(--font)"] } } }

<style>
  *, *::before, *::after { box-sizing: border-box; }

  /* ---------- THEME TOKENS (cool + blue defaults; JS overrides on #app-root) ---------- */
  #app-root {
    --accent: #2b53ec;
    --accent-d: #2340c0;
    --on-accent: #ffffff;
    --tint-base: #ffffff;

    --page: #f5f8fd;
    --page-r1: rgba(43, 83, 236, 0.10);
    --page-r2: rgba(124, 58, 237, 0.08);

    --panel: rgba(255, 255, 255, 0.78);
    --panel-2: #ffffff;
    --line: #e7ebf4;
    --text: #0e1626;
    --muted: #64748b;
    --subtle: #f2f5fb;
    --chip: rgba(255, 255, 255, 0.7);

    --font: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --radius: 24px;
    --shadow: 0 18px 50px rgba(20, 32, 64, 0.10);
    --shadow-sm: 0 8px 24px rgba(20, 32, 64, 0.07);

    --accent-glow: color-mix(in srgb, var(--accent) 34%, transparent);
    --accent-soft: color-mix(in srgb, var(--accent) 13%, var(--tint-base));
    --accent-softer: color-mix(in srgb, var(--accent) 7%, var(--tint-base));
    --accent-tint: color-mix(in srgb, var(--accent) 9%, transparent);
    --accent-ring: color-mix(in srgb, var(--accent) 22%, transparent);
    --accent-text: color-mix(in srgb, var(--accent) 72%, var(--text));
  }
  /* warm palette swaps neutrals + tint base */
  #app-root[data-pal="warm"] {
    --tint-base: #fff7ee;
    --page: #f6ede1;
    --page-r1: color-mix(in srgb, var(--accent) 12%, transparent);
    --page-r2: rgba(214, 158, 95, 0.16);
    --panel: rgba(255, 251, 245, 0.80);
    --panel-2: #fffaf3;
    --line: #ece0d1;
    --text: #2a2018;
    --muted: #8c7a64;
    --subtle: #f4ebde;
    --chip: rgba(255, 251, 245, 0.72);
    --shadow: 0 18px 50px rgba(95, 67, 32, 0.12);
    --shadow-sm: 0 8px 24px rgba(95, 67, 32, 0.09);
  }

  html, body { margin: 0; height: 100%; }
  button { font-family: inherit; background: transparent; border: 0; color: inherit; cursor: pointer; }
  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--page);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #app-root {
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% -4%, var(--page-r1), transparent 38%),
      radial-gradient(circle at 92% 0%, var(--page-r2), transparent 36%),
      var(--page);
    font-family: var(--font);
    color: var(--text);
    transition: background 0.4s ease, color 0.3s ease;
  }
  ::selection { background: var(--accent-tint); }

  /* ---------- ROBOT ---------- */
  .robot-wrap { position: relative; display: grid; place-items: center; flex: none; }
  .robot-wrap.float-on { animation: robotBob 4.6s ease-in-out infinite; }
  @keyframes robotBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  .robot-img {
    position: relative; z-index: 2; width: 100%; height: 100%; object-fit: contain;
    -webkit-mask-image: radial-gradient(ellipse 57% 60% at 50% 47%, #000 58%, transparent 76%);
            mask-image: radial-gradient(ellipse 57% 60% at 50% 47%, #000 58%, transparent 76%);
    filter: drop-shadow(0 14px 22px rgba(30, 25, 18, 0.18));
    user-select: none;
  }
  .robot-react { animation: robotReact 0.7s cubic-bezier(.3,.8,.3,1); }
  @keyframes robotReact {
    0% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-6deg) scale(1.06); }
    55% { transform: rotate(5deg) scale(1.03); }
    100% { transform: rotate(0) scale(1); }
  }
  .robot-glow {
    position: absolute; inset: -8%; z-index: 1; border-radius: 50%;
    background: radial-gradient(circle at 50% 48%, var(--accent-glow) 0%, transparent 60%);
    filter: blur(4px); animation: glowPulse 4.2s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100% { opacity: .6; transform: scale(.94); } 50% { opacity: 1; transform: scale(1.05); } }
  .robot-ring {
    position: absolute; inset: -3%; z-index: 0; border-radius: 50%;
    border: 2px dashed var(--accent-ring); animation: spin 22s linear infinite;
  }
  .robot-ring-dot {
    position: absolute; top: -6px; left: calc(50% - 6px); width: 12px; height: 12px;
    border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent-glow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- SURFACES ---------- */
  .glass {
    background: var(--panel); border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: var(--shadow);
  }
  .card-solid { background: var(--panel-2); border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
  .hairline { border-color: var(--line); }

  /* AI pill */
  .ai-pill {
    display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px 8px 12px;
    border-radius: 99px; background: var(--panel-2); border: 1px solid var(--line);
    box-shadow: var(--shadow-sm); font-weight: 700; font-size: 12px; letter-spacing: .12em;
    color: var(--text); text-transform: uppercase;
  }
  .ai-pill .spk { color: var(--accent); display: grid; place-items: center; }

  /* buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-weight: 700; font-size: 15px; border-radius: 16px; cursor: pointer; border: 1px solid transparent;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease, opacity .2s; }
  .btn:active { transform: translateY(1px) scale(.99); }
  .btn-primary { background: var(--accent); color: var(--on-accent);
    box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--accent-d); box-shadow: var(--shadow); }
  .btn-ghost { background: var(--panel-2); color: var(--text); border-color: var(--line); box-shadow: var(--shadow-sm); }
  .btn-ghost:hover { border-color: var(--accent-ring); background: var(--accent-softer); }
  .btn-soft { background: var(--accent-soft); color: var(--accent-text); }
  .btn-soft:hover { background: color-mix(in srgb, var(--accent) 18%, var(--tint-base)); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .icon-orb { display: grid; place-items: center; border-radius: 16px;
    background: var(--accent-soft); color: var(--accent-text);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 14%, transparent); }

  /* view transitions — transform-only so content is never hidden at rest/capture */
  .view-enter { opacity: 1; animation: viewIn .5s cubic-bezier(.2,.75,.25,1); }
  @keyframes viewIn { from { transform: translateY(14px); } to { transform: none; } }
  .stagger > * { animation: viewIn .55s cubic-bezier(.2,.75,.25,1) backwards; }
  .stagger > *:nth-child(1){animation-delay:.04s}.stagger > *:nth-child(2){animation-delay:.10s}
  .stagger > *:nth-child(3){animation-delay:.16s}.stagger > *:nth-child(4){animation-delay:.22s}
  .stagger > *:nth-child(5){animation-delay:.28s}.stagger > *:nth-child(6){animation-delay:.34s}

  .tile-hover { transition: transform .2s ease, box-shadow .25s ease, border-color .2s ease; }
  .tile-hover:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent-ring); }

  /* chat */
  .msg-in { animation: msgIn .4s cubic-bezier(.2,.8,.25,1); }
  @keyframes msgIn { from { transform: translateY(8px) scale(.98); } to { transform: none; } }
  .typing span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--muted); opacity: .5; animation: typing 1.1s infinite; }
  .typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
  @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity:.4 } 30% { transform: translateY(-5px); opacity:1 } }

  /* equalizer */
  .eq { display: flex; align-items: center; gap: 5px; height: 56px; }
  .eq span { width: 6px; border-radius: 99px; background: var(--accent); animation: eqBar 1s ease-in-out infinite; }
  .eq span:nth-child(1){animation-delay:0s}.eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}
  .eq span:nth-child(4){animation-delay:.1s}.eq span:nth-child(5){animation-delay:.4s}.eq span:nth-child(6){animation-delay:.25s}
  .eq span:nth-child(7){animation-delay:.05s}.eq span:nth-child(8){animation-delay:.35s}.eq span:nth-child(9){animation-delay:.2s}
  @keyframes eqBar { 0%,100% { height: 14%; } 50% { height: 100%; } }

  .pulse-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--accent-ring); animation: pulseRing 2s ease-out infinite; }
  .pulse-ring.d2 { animation-delay: .7s; } .pulse-ring.d3 { animation-delay: 1.4s; }
  @keyframes pulseRing { 0% { transform: scale(.7); opacity: .9; } 100% { transform: scale(1.7); opacity: 0; } }

  .slot { transition: transform .15s, border-color .2s, background .2s, color .2s; }

  /* scrollbar */
  .scroll-y { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .scroll-y::-webkit-scrollbar { width: 8px; }
  .scroll-y::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
