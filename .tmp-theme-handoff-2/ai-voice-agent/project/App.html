<script>
  tailwind.config = { corePlugins: { preflight: false }, theme: { extend: { fontFamily: { sans: ["Manrope", "ui-sans-serif", "system-ui"] } } } };

<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --accent: #bd7d34; --accent-d: #a3651f; --accent-soft: #f5e9d6; --accent-softer: #faf2e6; --accent-ink: #7a5320; --accent-tint: rgba(189,125,52,.14);
    --bg: #f4ebdd; --panel: #fffaf2; --panel-2: #fffaf2; --side: #fbf4e9;
    --line: #ebe0cf; --line-soft: #f1e8d9;
    --text: #2c2117; --text-2: #5d4f3d; --muted: #8f7e66;
    --ok-bg: #e4efe2; --ok-tx: #356b3c; --warn-bg: #f6ecd1; --warn-tx: #8f6516;
    --dn-bg: #f7e2da; --dn-tx: #9c3c28; --in-bg: #e6ecf5; --in-tx: #3a5a8c; --mu-bg: #efe6d6; --mu-tx: #7c6b53;
    --shadow: 0 14px 40px rgba(95, 67, 28, 0.10); --shadow-sm: 0 6px 18px rgba(95, 67, 28, 0.07);
    --radius: 18px;
    --font: 'Manrope', ui-sans-serif, system-ui, sans-serif;
  }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font); color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  button { font-family: inherit; background: transparent; border: 0; cursor: pointer; color: inherit; }
  #root { min-height: 100vh; }
  ::selection { background: var(--accent-tint); }

  /* layout */
  .shell { min-height: 100vh; background:
      radial-gradient(circle at 6% -4%, rgba(189,125,52,.07), transparent 30%),
      radial-gradient(circle at 98% 0%, rgba(176,124,60,.08), transparent 34%), var(--bg); }
  .side { position: fixed; inset: 0 auto 0 0; width: 276px; background: var(--side);
    border-right: 1px solid var(--line); display: flex; flex-direction: column; z-index: 40; }
  .content { margin-left: 276px; min-width: 0; }
  @media (max-width: 1024px) { .side { transform: translateX(-100%); transition: transform .28s cubic-bezier(.3,.8,.3,1); box-shadow: var(--shadow); } .side.open { transform: none; } .content { margin-left: 0; } }

  .nav-item { display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 12px;
    font-size: 14px; font-weight: 600; color: var(--text-2); transition: background .15s, color .15s; white-space: nowrap; }
  .nav-item:hover { background: #f3e9d8; color: var(--text); }
  .nav-item.on { background: var(--accent); color: #fff; box-shadow: 0 8px 18px rgba(189,125,52,.28); }
  .nav-item.on:hover { background: var(--accent); color: #fff; }
  .nav-sec { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding: 16px 12px 6px; }

  .topbar { position: sticky; top: 0; z-index: 30; background: color-mix(in srgb, var(--panel) 84%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }

  /* buttons */
  .ui-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700;
    border-radius: 12px; border: 1px solid transparent; transition: background .15s, box-shadow .2s, transform .1s, border-color .15s, color .15s; white-space: nowrap; }
  .ui-btn:active { transform: translateY(1px); }
  .ui-btn:disabled { opacity: .5; cursor: not-allowed; }
  .ui-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
  .ui-primary:hover { background: var(--accent-d); }
  .ui-ghost { background: var(--panel); color: var(--text); border-color: var(--line); box-shadow: var(--shadow-sm); }
  .ui-ghost:hover { border-color: var(--accent); color: var(--accent-ink); }
  .ui-soft { background: var(--accent-soft); color: var(--accent-ink); }
  .ui-soft:hover { background: color-mix(in srgb, var(--accent) 22%, #fff); }
  .ui-subtle { background: transparent; color: var(--text-2); }
  .ui-subtle:hover { background: #f1e7d6; color: var(--text); }
  .ui-danger { background: var(--dn-bg); color: var(--dn-tx); }
  .ui-danger:hover { background: color-mix(in srgb, var(--dn-tx) 16%, #fff); }

  /* card */
  .ui-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); }

  /* badge */
  .ui-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 99px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .ui-badge .ui-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .ui-badge-ok { background: var(--ok-bg); color: var(--ok-tx); }
  .ui-badge-warn { background: var(--warn-bg); color: var(--warn-tx); }
  .ui-badge-danger { background: var(--dn-bg); color: var(--dn-tx); }
  .ui-badge-info { background: var(--in-bg); color: var(--in-tx); }
  .ui-badge-muted { background: var(--mu-bg); color: var(--mu-tx); }

  /* inputs */
  .ui-input { width: 100%; background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 11px 13px; font-size: 14px; color: var(--text); outline: none; font-family: var(--font); transition: border-color .15s, box-shadow .15s; }
  .ui-input::placeholder { color: #b3a285; }
  .ui-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }
  textarea.ui-input { min-height: 96px; resize: vertical; }
  .ui-select { appearance: none; padding-right: 34px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238f7e66' d='M0 0h12L6 8z'/></svg>");
    background-repeat: no-repeat; background-position: right 13px center; }

  /* toggle */
  .ui-toggle { position: relative; width: 42px; height: 24px; border-radius: 99px; background: #d9cbb4; transition: background .18s; flex: none; }
  .ui-toggle i { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: transform .18s; }
  .ui-toggle-on { background: var(--accent); } .ui-toggle-on i { transform: translateX(18px); }

  /* tabs */
  .ui-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .ui-tab { padding: 8px 14px; border-radius: 10px; font-size: 13.5px; font-weight: 700; color: var(--muted); }
  .ui-tab:hover { background: #f1e7d6; color: var(--text); }
  .ui-tab-on { background: var(--text); color: #fff; } .ui-tab-on:hover { background: var(--text); color: #fff; }

  /* segmented */
  .ui-seg { display: inline-flex; padding: 3px; gap: 2px; background: #efe6d5; border-radius: 12px; }
  .ui-seg-btn { padding: 7px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; color: var(--text-2); }
  .ui-seg-on { background: var(--panel); color: var(--text); box-shadow: var(--shadow-sm); }

  /* misc */
  .ui-iconbox { display: grid; place-items: center; width: 44px; height: 44px; border-radius: 14px; background: var(--accent-soft); color: var(--accent-ink); flex: none; }
  .ui-trend { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 99px; background: var(--ok-bg); color: var(--ok-tx); font-size: 12px; font-weight: 700; }
  .ui-trend-down { background: var(--dn-bg); color: var(--dn-tx); }

  /* table */
  .ui-table { width: 100%; border-collapse: collapse; }
  .ui-table th { text-align: left; font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); padding: 12px 16px; background: var(--accent-softer); }
  .ui-table td { padding: 14px 16px; border-top: 1px solid var(--line-soft); font-size: 14px; color: var(--text-2); }
  .ui-table tbody tr { transition: background .12s; }
  .ui-table tbody tr:hover { background: var(--accent-softer); }
  .ui-tablewrap { overflow-x: auto; }

  /* modal */
  .ui-modal-bg { position: fixed; inset: 0; z-index: 80; background: rgba(44,33,23,.4); backdrop-filter: blur(3px); display: grid; place-items: center; padding: 16px; animation: fade .2s ease; }
  .ui-modal { width: 100%; max-height: calc(100vh - 32px); display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); animation: pop .25s cubic-bezier(.2,.8,.3,1); }
  @keyframes fade { from { opacity: 0 } } @keyframes pop { from { opacity: 0; transform: translateY(12px) scale(.98) } }

  /* charts */
  .ui-bar-track { align-items: flex-end; }
  .ui-bar { width: 100%; border-radius: 7px 7px 3px 3px; background: var(--accent); transition: opacity .15s; }
  .ui-bar-track:hover .ui-bar { opacity: .8; }

  /* entrance (transform-only so never invisible) */
  .view-enter { animation: viewIn .4s cubic-bezier(.2,.75,.25,1); }
  @keyframes viewIn { from { transform: translateY(12px); } to { transform: none; } }
  .pop-row { animation: viewIn .4s cubic-bezier(.2,.75,.25,1) backwards; }

  /* scrollbars */
  .ui-scroll { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .ui-scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .ui-scroll::-webkit-scrollbar-thumb { background: #ddceb5; border-radius: 99px; border: 2px solid transparent; background-clip: content-box; }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; } }
</style>
</head>
<body>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
